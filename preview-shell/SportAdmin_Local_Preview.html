<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ljungby SS Preview Shell</title>
  <style>
    :root {
      --top-blue: #246cbf;
      --deep-indigo: #201c9c;
      --page-bg: #edf5fb;
      --card: #ffffff;
      --border: #d9e4ee;
      --text: #16344e;
      --muted: #5d778f;
      --shadow: 0 8px 18px rgba(36, 76, 110, 0.05);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Roboto, Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    body {
      background-image: url("./assets/LSS%20bg%20image.jpg");
      background-repeat: repeat-x;
      background-size: 2500px;
      background-position: center 0;
      background-attachment: fixed;
      background-color: #dff0f8;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site {
      max-width: 1230px;
      margin: 0 auto;
      position: relative;
    }

    .header-shell {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      position: relative;
    }

    .header-shell::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 87px;
      height: 87px;
      background: var(--top-blue);
      z-index: 1;
    }

    .top-menu {
      background: var(--top-blue);
      color: #fff;
      min-height: 40px;
      width: 100%;
    }

    .top-menu-inner {
      max-width: 1230px;
      margin: 0 auto;
      min-height: 40px;
      position: relative;
      padding: 0 0 0 59px;
      display: grid;
      grid-template-columns: minmax(0, 1029px) 132px;
      align-items: center;
      gap: 0;
    }

    .top-menu-links,
    .login-area {
      display: flex;
      align-items: center;
    }

    .top-menu-links {
      gap: 0;
      width: 1029px;
      min-width: 0;
      max-width: 1029px;
      overflow: hidden;
      justify-content: flex-start;
    }

    .top-item {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 12px;
      font-family: "Roboto Condensed", Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .top-item.active {
      background: var(--deep-indigo);
    }

    .login-area {
      white-space: nowrap;
      min-width: 132px;
      width: 132px;
      padding-right: 10px;
      justify-content: flex-end;
      font-family: "Roboto Condensed", Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .logo-wrap {
      position: absolute;
      left: 32px;
      top: 4px;
      width: 83px;
      height: 83px;
      z-index: 3;
      overflow: visible;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .sub-menu {
      background: var(--deep-indigo);
      color: #fff;
      height: 44px;
      overflow: hidden;
      width: 100%;
    }

    .sub-menu-inner {
      width: 1230px;
      max-width: 1230px;
      height: 44px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      padding: 0 0 0 82px;
      gap: 0;
    }

    .sub-item {
      display: inline-flex;
      align-items: center;
      height: 44px;
      padding: 0 9px;
      font-family: "Roboto Condensed", Arial, Helvetica, sans-serif;
      font-size: 12px;
      color: #fff;
      white-space: nowrap;
    }

    .sub-divider {
      height: 2px;
      background: var(--deep-indigo);
      width: 1230px;
      margin: 0 auto;
    }

    .main-row {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      background: #fff;
      padding: 0 0 22px;
    }

    .main-column {
      width: 955px;
      background: transparent;
      min-height: 1000px;
    }

    .content-wrap {
      max-width: 955px;
      padding: 31px 0 32px;
    }

    .content-stage {
      width: 955px;
      max-width: 955px;
      overflow: hidden;
      border: 0;
      background: transparent;
    }

    iframe {
      display: block;
      width: 955px;
      min-height: 4200px;
      border: 0;
      overflow: hidden;
      background: #fff;
    }

    .rail {
      width: 230px;
      padding: 4px 0 24px;
      background: #fff;
      min-height: 1000px;
    }

    .rail-block {
      margin-bottom: 8px;
      background: #fff;
    }

    .fb-block {
      border: 1px solid #ddd;
    }

    .fb-header {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px;
    }

    .fb-header img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      border: 1px solid #cfd8e0;
      background: #fff;
      padding: 3px;
    }

    .fb-title {
      font-size: 14px;
      line-height: 1.25;
      color: #23415a;
      padding-top: 2px;
    }

    .fb-title strong {
      display: block;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 145px;
    }

    .fb-title span {
      display: block;
      font-size: 12px;
      color: #576f84;
      margin-top: 2px;
    }

    .fb-footer {
      padding: 10px;
      border-top: 1px solid #e3e7eb;
      background: #f8f8f8;
    }

    .follow-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      background: #f5f8fb;
      border: 1px solid #ccd6df;
      color: #345d82;
      font-size: 12px;
      font-weight: 700;
    }

    .instagram-block img,
    .promo-block img,
    .sponsor-rotator img,
    .sponsor-static img {
      display: block;
      width: 100%;
      height: auto;
    }

    .section-label {
      margin: 0 0 4px;
      font-size: 12px;
      font-weight: 700;
      color: #222;
      text-transform: uppercase;
    }

    .section-label-wrap {
      margin-bottom: 2px;
      padding: 8px 0 0;
    }

    .sponsor-strip {
      border-top: 4px solid var(--top-blue);
      padding-top: 8px;
    }

    .sponsor-card {
      border: 1px solid #ddd;
      border-radius: 5px;
      background: #fff;
      overflow: hidden;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
    }

    .sponsor-card.tall {
      min-height: 80px;
    }

    .sponsor-card.medium {
      min-height: 60px;
    }

    .sponsor-card img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      background: #fff;
    }

    .cookie-row {
      max-width: 1230px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0 18px;
      color: #315671;
      font-size: 12px;
    }

    .sportadmin-logo {
      width: 180px;
      height: auto;
      display: block;
    }

    @media (max-width: 1260px) {
      .site {
        margin: 0 10px;
      }
    }

    @media (max-width: 1024px) {
      .top-menu-inner {
        padding-left: 84px;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .top-item {
        min-height: 38px;
      }

      .top-menu-links {
        width: auto;
        max-width: 100%;
      }

      .sub-menu-inner {
        padding-left: 84px;
      }

      .sub-menu,
      .sub-divider {
        width: auto;
      }

      .sub-menu-inner {
        max-width: none;
        width: auto;
        flex-wrap: wrap;
        height: auto;
        padding-top: 12px;
        padding-bottom: 12px;
      }

      .main-row {
        flex-direction: column;
      }

      .main-column,
      .content-stage,
      iframe,
      .rail {
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="site">
    <div class="header-shell">
      <div class="logo-wrap">
        <img src="https://cdn.sportadmin.se/699/h/253/6f6af15bcf7ca2838abab680c44e94002497418149c527f5df6894d635053256_L.png" alt="Ljungby Simsällskap">
      </div>

      <div class="top-menu">
        <div class="top-menu-inner">
          <div class="top-menu-links">
            <span class="top-item active">⌂ Hem</span>
            <span class="top-item">Simskola</span>
            <span class="top-item">Träna och tävla</span>
            <span class="top-item">Tävlingsarrangemang</span>
            <span class="top-item">Vuxensimning</span>
            <span class="top-item">Öppet vatten</span>
            <span class="top-item">Kontakt</span>
            <span class="top-item">Boka ↗</span>
          </div>
          <div class="login-area">Logga in ▼</div>
        </div>
      </div>

      <div class="sub-menu">
        <div class="sub-menu-inner">
          <span class="sub-item">Ljungby Simsällskap</span>
          <span class="sub-item">Om klubben ▼</span>
          <span class="sub-item">Bildgalleri</span>
          <span class="sub-item">Kontakt</span>
          <span class="sub-item">Sponsorer ▼</span>
          <span class="sub-item">Kalender</span>
          <span class="sub-item">WebbShop</span>
          <span class="sub-item">Hjälp till i Ljungby SS</span>
        </div>
      </div>
      <div class="sub-divider"></div>
    </div>

    <div class="main-row">
      <main class="main-column">
        <div class="content-wrap">
          <section class="content-stage">
            <iframe id="contentFrame" title="SportAdmin preview content" scrolling="no"></iframe>
          </section>
        </div>
      </main>

      <aside class="rail">
        <div class="rail-block fb-block">
          <div class="fb-header">
            <img src="./assets/LSS%20loga%20trans.%20small.png" alt="Ljungby Simsällskap">
            <div class="fb-title">
              <strong>Ljungby Simsällskap</strong>
              <span>859 följare</span>
            </div>
          </div>
          <div class="fb-footer">
            <span class="follow-btn">Följ sida</span>
          </div>
        </div>

        <div class="rail-block instagram-block">
          <img src="https://cdn.sportadmin.se/699/h/253/196b770410bfdcb88f0107499cfb1c6075bed91c8501dea2aac6840678b8d851_M.png" alt="Instagram">
        </div>

        <div class="section-label-wrap">
          <div class="section-label">Sponsorer</div>
        </div>

        <div class="sponsor-strip">
          <div class="sponsor-card tall">
            <img src="https://www.ljungbyss.se/spalt/253/5403/14212_2_460.png?v=2" alt="Ljungby Bredband">
          </div>
          <div class="sponsor-card medium">
            <img src="https://www.ljungbyss.se/spalt/253/5403/17640_2_460.jpg?v=2" alt="Colorama">
          </div>
          <div class="sponsor-card tall">
            <img src="https://www.ljungbyss.se/spalt/253/5403/19339_2_460.jpg?v=2" alt="Kalmar">
          </div>
          <div class="sponsor-card medium">
            <img src="https://www.ljungbyss.se/spalt/253/5403/15366_2_460.png?v=2" alt="Gibon">
          </div>
        </div>

        <div class="rail-block promo-block">
          <img src="http://impse.tradedoubler.com/imp?type(img)g(20751698)a(2176386)" alt="Gräsroten">
        </div>
      </aside>
    </div>

    <div class="cookie-row">
      <span>Cookie-inställningar</span>
      <img class="sportadmin-logo" src="https://www.ljungbyss.se/im/nyaloggan.png" alt="SportAdmin">
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const defaultContent = "../experiments/lss-sportadmin-visual-01/05_Visual_Story_Copy_Refined.html";
    const content = params.get("content") || defaultContent;
    const frame = document.getElementById("contentFrame");
    frame.src = content;

    function resizeFrame() {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc) return;
        doc.documentElement.style.overflow = "hidden";
        doc.body.style.overflow = "hidden";
        const height = Math.max(
          doc.body.scrollHeight,
          doc.documentElement.scrollHeight,
          doc.body.offsetHeight,
          doc.documentElement.offsetHeight
        );
        frame.style.height = Math.max(height + 2, 4200) + "px";
      } catch (e) {
        frame.style.height = "4200px";
      }
    }

    frame.addEventListener("load", () => {
      resizeFrame();
      setTimeout(resizeFrame, 120);
      setTimeout(resizeFrame, 500);
      setTimeout(resizeFrame, 1200);
    });

    window.addEventListener("resize", resizeFrame);
  </script>
</body>
</html>
